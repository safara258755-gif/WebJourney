<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik border 1</title>
    <style>
        .solid {
            border: 3px solid rgb(226, 101, 120);
            padding: 10px;
            background-color: lightpink;
        }
        .dotted {
            border: 3px dotted red; 
            padding: 10px;
            background-color: rgb(201, 240, 128);
        }
        .double {
            border: 5px double rgb(4, 62, 98); 
            padding: 10px;
            background-color: mediumpurple;
        }
        .dashed {
            border: 5px dashed orange; 
            padding: 10px;
            background-color: lightskyblue;
        }
        .groove {
            border: 5px groove rgb(44, 128, 16); 
            padding: 10px;
            background-color: rgb(255, 213, 116);
        }
        .ridge {
            border: 5px ridge rgb(180, 201, 21); 
            padding: 10px;
            background-color: aquamarine;
        }
    </style>
    
</head>
<body>
    <h2>Contoh Border CSS</h2>
    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>

</body>
</html>
