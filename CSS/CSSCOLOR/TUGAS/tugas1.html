<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas Warna</title>
    <style>
    .nama-warna {
        color: blue; 
    }
    .rgb {
      color: rgb(255, 0, 0); /* merah */
    }
    .rgba {
      color: rgba(0, 128, 0, 0.7); /* hijau transparan */
    }
    .hsl {
      color: hsl(200, 100%, 50%); /* biru */
    }
    .hsla {
      color: hsla(300, 100%, 50%, 0.5); /* ungu transparan */
    }
    </style>
</head>
<body>
    <h1 class="nama-warna">Contoh Nama Warna</h1>
    <h1 class="rgb">Contoh RGB</h1>
    <h1 class="rgba">Contoh RGBA</h1>
    <h1 class="hsl">Contoh HSL</h1>
    <h1 class="hsla">Contoh HSLA</h1>
</body>
</html>
