<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        /* Gaya dasar menu */
        .menu {
            background-color: #333;
            overflow: hidden;
        }
        .menu a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        /* efek hover */
        .menu a:hover {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <h2>Contoh menu Hover</h2>
    <div class="menu">
        <a href="#">beranda</a>
        <a href="#">tentang</a>
        <a href="#">layanan</a>
        <a href="#">kontak</a>
        
    </div>
</body>
</html>
