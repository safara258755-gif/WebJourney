<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #476f95;
            text-align: center;
        }
        div.gallery {
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: #777 1px 1px 2px;
        }
        div.gallery-item {
            margin: 13px;
            border: 3px solid #edede2;
            width: 180px;
            justify-content: center;
            display: flex;
            flex-direction: column;

        }
        div.gallery-item:hover {
            border: 1px solid #777;
        }
        div.gallery-item img {
            width: 100%;
            height: auto;
        }
        div.gallery-item div.desc {
            padding: 15px;
            background-color: whitesmoke;
        }

    </style>
</head>
<body>
    <H1>GALERRY RISMA</H1>
    <div class="gallery">
    <div class="gallery-item">
        <a target="_blank" href="rismaprincess.jpg">
            <img src="rismaprincess.jpg" alt="rismaprincess" width="600" height="400">
        </a>
        <div class="desc">risma princess</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="rismamainhp.jpg">
            <img src="rismamainhp.jpg" alt="rismamainhp" width="600" height="400">
        </a>
        <div class="desc">risma main hp</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="rismalope.jpg">
            <img src="rismalope.jpg" alt="rismalope" width="600" height="400">
        </a>
        <div class="desc">risma lope</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="rismamelet.jpg">
            <img src="rismamelet.jpg" alt="rismamelet" width="600" height="400">
        </a>
        <div class="desc">risma melet</div>
    </div>

    </div>
</body>
</html>
