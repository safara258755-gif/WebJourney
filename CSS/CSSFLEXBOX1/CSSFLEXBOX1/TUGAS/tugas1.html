<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box dengan flex-dirextion row</title>
    <style>
        h2 {
            text-align: center;
        }
        .container {
            width: 600px;
            margin: 30px;
            padding: 5px;
            display: flex;
            justify-content: center;
            
        }
        .container img {
            width: 150px;
            height:150px;
            background-color: blue;
            margin: 5px;
            border-radius: 10%;

        }
    </style>
</head>
<body>
    <h2>Galeri Patrick</h2>
    <div class="container">
        <img src="patrik.jpg" alt="gambarpatrik">
        <img src="patrik.jpg" alt="gambarpatrik">
        <img src="patrik.jpg" alt="gambarpatrik">
        <img src="patrik.jpg" alt="gambarpatrik">
    </div>
</body>
</html>
