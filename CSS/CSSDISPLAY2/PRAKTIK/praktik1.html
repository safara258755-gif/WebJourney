<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>overflow visible</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid;
            overflow: visible;
        }
    </style>
</head>
<body>
    <h2>Overvlow: visible</h2>

    <p>By default, the overflow is visible,
        meaning that it is not clipped and it
        renders outside the element's box: 
    </p>

    <div>
        You can use the overflow property when
        you want to have better control of the layout.
        The overflow property specifies what happens 
        if content overflows element's box.
    </div>
</body>
</html>
