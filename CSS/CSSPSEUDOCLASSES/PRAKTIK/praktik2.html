<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo urutan elemen</title>
    <style>
        li:first-child a {
            color: green;
        }
        li:last-child a {
            color: green;
        }
        li:nth-child(3) a {
            color: green;
        }
        li:nth-child(2n) a {
            color: green;
        }
        li:nth-child(2n-1) a {
            color: green;
        }
        
    </style>
</head>
<body>
    <a href="#" class="hello">hello world</a>
    <ul>
        <li><a href="#">Link1</a></li>
        <li><a href="#">Link2</a></li>
        <li><a href="#">Link3</a></li>
        <li><a href="#">Link4</a></li>
        <li><a href="#">Link5</a></li>
    </ul>
</body>
</html>
