<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font style with keywords</title>
    <style>
        .font-arial {
            font-family: Arial, sans-serif;
        }
        .font-times {
            font-family: 'Times New Roman', serif;
        }
        .font-courier {
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <p class="font-arial">this is arial font text</p>
    <p class="font-times">this is times new roman font text</p>
    <p class="font-courier">this is courier new font text</p>
</html>
