<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display block dan inline</title>
    <style>
        .block {
            display: block;
            background-color: lightblue;
            margin: 5px;
        }
        .inline {
            display: inline;
            background-color: lightcgreen;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h2>Contoh block</h2>
    <div class="block">box1</div>
    <div class="block">box2</div>

    <h2>Contoh inline</h2>
    <span class="inline">boxA</span>
    <span class="inline">boxB</span>
</body>
</html>
