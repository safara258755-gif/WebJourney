<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text transform</title>
    <style>
        h1 {
            text-transform: capitalize;
        }
        .upper {
            text-transform: uppercase;
        }
        .lower {
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <h1>SAYANG SIO</h1>
    <p>
        <span class="upper">haiiii sayanggg</span> 
        <span class="lower">AKU SAYANGGG SAMA PHAINONKU TERCINTA TERSAYANG DAN TERKASIH
        </span>
    </p>
</body>
</html>
